<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siparişlerim — Akif İletişim</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root{
      --bg:#111315;--surface:#1a1d21;--surface-2:#21252b;--surface-3:#272c33;
      --border:#2e333a;--gold:#c9a84c;--gold-light:#e2c47a;
      --gold-dim:rgba(201,168,76,.12);--gold-border:rgba(201,168,76,.28);
      --text-1:#eaedf0;--text-2:#9aa0aa;--text-3:#4a5060;
      --green:#4ade80;--green-dim:rgba(74,222,128,.12);
      --red:#f87171;--amber:#fbbf24;
      font:400 14px/1.6 'Poppins',sans-serif;color:var(--text-1);background:var(--bg);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

    header{position:sticky;top:0;z-index:100;height:64px;background:rgba(17,19,21,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .h-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-icon{width:34px;height:34px;border-radius:8px;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:13px}
    .logo-text{font-size:14px;font-weight:800;letter-spacing:-.02em}
    .logo-text span{color:var(--gold)}
    .h-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);font-size:12px;font-weight:500;color:var(--text-2);transition:all .2s;cursor:pointer}
    .h-btn:hover{color:var(--text-1);border-color:var(--text-3)}

    .wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px}

    /* Hero profil kartı */
    .profile-hero{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
    .profile-avatar{width:64px;height:64px;border-radius:50%;border:2px solid var(--gold-border);background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--gold);flex-shrink:0;overflow:hidden}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .profile-info{flex:1}
    .profile-name{font-size:20px;font-weight:800;letter-spacing:-.03em}
    .profile-email{font-size:12px;color:var(--text-2);margin-top:2px}
    .profile-stats{display:flex;gap:24px;margin-top:12px;flex-wrap:wrap}
    .profile-stat{text-align:center}
    .profile-stat-val{font-size:22px;font-weight:800;color:var(--gold)}
    .profile-stat-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em}
    .profile-actions{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
    .wa-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
    .wa-btn:hover{background:rgba(37,211,102,.18)}
    .signout-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
    .signout-btn:hover{border-color:var(--red);color:var(--red)}

    /* Filtre bar */
    .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .filter-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;color:var(--text-2);border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;font-family:'Poppins',sans-serif}
    .filter-btn:hover{color:var(--text-1);border-color:var(--text-3)}
    .filter-btn.active{background:var(--gold);border-color:var(--gold);color:#0a0a0a;font-weight:700}

    /* Sipariş kartları */
    .orders-list{display:flex;flex-direction:column;gap:14px}
    .order-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fade-up .35s ease both;transition:border-color .2s}
    .order-card:hover{border-color:var(--gold-border)}
    @keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .order-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
    .order-head:hover{background:rgba(255,255,255,.02)}
    .order-no{font-size:12px;font-weight:700;font-family:monospace;color:var(--gold)}
    .order-date{font-size:11px;color:var(--text-3)}
    .order-total{font-size:15px;font-weight:800;color:var(--gold)}
    .order-head-right{display:flex;align-items:center;gap:10px}
    .order-chevron{color:var(--text-3);font-size:11px;transition:transform .2s}
    .order-card.open .order-chevron{transform:rotate(180deg)}
    .order-body{display:none;padding:16px 20px;border-top:1px solid var(--border)}
    .order-card.open .order-body{display:block}
    .order-items{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
    .order-item{display:flex;align-items:center;gap:10px;font-size:13px}
    .order-item-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
    .order-item-name{flex:1;color:var(--text-1)}
    .order-item-qty{color:var(--text-3);font-size:12px}
    .order-item-price{font-weight:700;color:var(--gold)}
    .order-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .order-meta-row{font-size:12px}
    .order-meta-label{color:var(--text-3);margin-bottom:2px}
    .order-meta-value{font-weight:600;color:var(--text-1)}
    .order-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:14px;border-top:1px solid var(--border)}
    .wa-track-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
    .wa-track-btn:hover{background:rgba(37,211,102,.2)}

    /* Status badges */
    .status{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
    .status-pending{background:rgba(251,191,36,.14);color:#fbbf24}
    .status-processing{background:rgba(201,168,76,.14);color:#c9a84c}
    .status-shipped{background:rgba(74,222,128,.14);color:#4ade80}
    .status-completed{background:rgba(74,222,128,.14);color:#4ade80}
    .status-cancelled{background:rgba(248,113,113,.14);color:#f87171}

    /* Auth notice */
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 32px;text-align:center;margin-top:28px}
    .auth-card i{font-size:48px;color:var(--gold);margin-bottom:16px}
    .auth-card h2{font-size:20px;font-weight:800;margin-bottom:8px}
    .auth-card p{color:var(--text-2);font-size:13px;margin-bottom:20px}
    .google-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:10px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Poppins',sans-serif}
    .google-btn:hover{background:rgba(201,168,76,.2)}

    /* Empty */
    .empty-state{text-align:center;padding:60px 24px;color:var(--text-3)}
    .empty-state i{font-size:44px;margin-bottom:14px;display:block}
    .empty-state h3{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--text-2)}
    .empty-state p{font-size:13px;margin-bottom:20px}
    .shop-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:10px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Poppins',sans-serif}
    .shop-btn:hover{background:rgba(201,168,76,.2)}

    /* Loader */
    .loader{text-align:center;padding:48px;color:var(--text-3)}
    .loader i{font-size:28px;margin-bottom:10px;display:block}

    @media(max-width:600px){.wrap{padding:20px 16px 60px}.profile-hero{padding:20px}.order-meta{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header>
  <div class="h-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
      <div class="logo-text">Akif <span>İletişim</span></div>
    </a>
    <a class="h-btn" href="index.html"><i class="fa-solid fa-arrow-left"></i> Alışverişe Dön</a>
  </div>
</header>

<div class="wrap">
  <!-- Auth gerekli -->
  <div id="auth-card" class="auth-card" style="display:none;">
    <i class="fa-solid fa-user-lock"></i>
    <h2>Giriş Yapın</h2>
    <p>Sipariş geçmişinizi görebilmek için Google hesabınızla giriş yapın.</p>
    <button class="google-btn" onclick="signInGoogle()"><i class="fa-brands fa-google"></i> Google ile Giriş Yap</button>
  </div>

  <!-- Profil + siparişler -->
  <div id="profile-area" style="display:none;">
    <div class="profile-hero">
      <div class="profile-avatar" id="profile-avatar"><i class="fa-solid fa-user"></i></div>
      <div class="profile-info">
        <div class="profile-name" id="profile-name">—</div>
        <div class="profile-email" id="profile-email">—</div>
        <div class="profile-stats">
          <div class="profile-stat"><div class="profile-stat-val" id="stat-total">0</div><div class="profile-stat-lbl">Toplam Sipariş</div></div>
          <div class="profile-stat"><div class="profile-stat-val" id="stat-pending">0</div><div class="profile-stat-lbl">Bekleyen</div></div>
          <div class="profile-stat"><div class="profile-stat-val" id="stat-completed">0</div><div class="profile-stat-lbl">Tamamlanan</div></div>
        </div>
      </div>
      <div class="profile-actions">
        <button class="wa-btn" onclick="waSupport()"><i class="fa-brands fa-whatsapp"></i> WhatsApp Destek</button>
        <button class="signout-btn" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"></i> Çıkış</button>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">Tümü</button>
      <button class="filter-btn" onclick="setFilter('pending',this)"><i class="fa-solid fa-clock" style="color:var(--amber);"></i> Bekliyor</button>
      <button class="filter-btn" onclick="setFilter('processing',this)"><i class="fa-solid fa-gear" style="color:var(--gold);"></i> Hazırlanıyor</button>
      <button class="filter-btn" onclick="setFilter('shipped',this)"><i class="fa-solid fa-truck" style="color:var(--green);"></i> Kargoda</button>
      <button class="filter-btn" onclick="setFilter('completed',this)"><i class="fa-solid fa-circle-check" style="color:var(--green);"></i> Tamamlandı</button>
    </div>

    <div id="orders-list" class="orders-list">
      <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i>Siparişler yükleniyor…</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyA_qQBvQgAMON13EDSPTUNu58t0W4RD0FA",authDomain:"akif-iletisim-gercekci.firebaseapp.com",projectId:"akif-iletisim-gercekci",storageBucket:"akif-iletisim-gercekci.firebasestorage.app",messagingSenderId:"527995566381",appId:"1:527995566381:web:9ef6f0e8c37acbec89fba4",measurementId:"G-D9WD7K857R"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
const provider=new firebase.auth.GoogleAuthProvider();
provider.setCustomParameters({prompt:'select_account'});
const WA_NUMBER='905419705263';

var allOrders=[];
var currentFilter='all';
var orderUnsubs=[];
var orderDocsBySource={uid:[],email:[],customerEmail:[]};

function fmt(n){return Number(n||0).toLocaleString('tr-TR',{style:'currency',currency:'TRY',minimumFractionDigits:2})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var STATUS_MAP={
  pending:{label:'Bekliyor',cls:'status-pending',icon:'fa-clock'},
  processing:{label:'Hazırlanıyor',cls:'status-processing',icon:'fa-gear'},
  shipped:{label:'Kargoda',cls:'status-shipped',icon:'fa-truck'},
  completed:{label:'Tamamlandı',cls:'status-completed',icon:'fa-circle-check'},
  cancelled:{label:'İptal',cls:'status-cancelled',icon:'fa-ban'},
};

function statusBadge(s){
  var info=STATUS_MAP[s]||STATUS_MAP.pending;
  return '<span class="status '+info.cls+'"><i class="fa-solid '+info.icon+'"></i> '+info.label+'</span>';
}

async function signInGoogle(){
  try{ await auth.signInWithPopup(provider); }
  catch(e){ if(e.code!=='auth/popup-closed-by-user') alert('Giriş başarısız.'); }
}
async function signOut(){
  orderUnsubs.forEach(function(fn){try{fn();}catch(e){}});
  orderUnsubs=[];
  await auth.signOut();
}

function waSupport(){
  var msg='Merhaba Akif İletişim, sipariş takibi konusunda yardım almak istiyorum.';
  window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');
}

function waTrack(orderNo, name){
  var msg='Merhaba, #'+orderNo+' numaralı siparişimin durumunu öğrenmek istiyorum. Ad: '+name;
  window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');
}

function setFilter(filter, btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  if(btn) btn.classList.add('active');
  renderMergedOrders();
}

function toggleOrder(card){
  card.classList.toggle('open');
}

function mergeOrders(){
  var byId={};
  ['uid','email','customerEmail'].forEach(function(k){
    (orderDocsBySource[k]||[]).forEach(function(doc){ byId[doc.id]=doc; });
  });
  return Object.keys(byId).map(function(id){ return byId[id]; }).sort(function(a,b){
    var ta=a.data().createdAt&&a.data().createdAt.seconds?a.data().createdAt.seconds:0;
    var tb=b.data().createdAt&&b.data().createdAt.seconds?b.data().createdAt.seconds:0;
    return tb-ta;
  });
}

function renderMergedOrders(){
  var docs=mergeOrders();

  /* İstatistik güncelle */
  document.getElementById('stat-total').textContent=docs.length;
  document.getElementById('stat-pending').textContent=docs.filter(function(d){return d.data().status==='pending'||!d.data().status;}).length;
  document.getElementById('stat-completed').textContent=docs.filter(function(d){return d.data().status==='completed';}).length;

  /* Filtrele */
  if(currentFilter!=='all'){
    docs=docs.filter(function(d){
      var s=d.data().status||'pending';
      return s===currentFilter;
    });
  }

  var listEl=document.getElementById('orders-list');
  if(!docs.length){
    listEl.innerHTML='<div class="empty-state"><i class="fa-solid fa-bag-shopping"></i><h3>'+(currentFilter==='all'?'Henüz Sipariş Yok':'Bu Filtrede Sipariş Yok')+'</h3><p>'+(currentFilter==='all'?'İlk siparişinizi vermek için alışverişe başlayın.':'Farklı bir filtre seçin.')+'</p><a href="index.html" class="shop-btn"><i class="fa-solid fa-store"></i> Alışverişe Başla</a></div>';
    return;
  }

  listEl.innerHTML=docs.map(function(doc,idx){
    var d=doc.data();
    var orderNo='#'+doc.id.slice(-8).toUpperCase();
    var date=d.createdAt&&d.createdAt.toDate?d.createdAt.toDate().toLocaleString('tr-TR'):'—';
    var status=d.status||'pending';
    var itemCount=Array.isArray(d.items)?d.items.reduce(function(t,i){return t+(i.qty||1)},0):0;
    var customerName=(d.customer&&d.customer.name)||'—';

    var itemsHtml=Array.isArray(d.items)?d.items.map(function(item){
      return '<div class="order-item">'+
        '<div class="order-item-dot"></div>'+
        '<div class="order-item-name">'+esc(item.name)+'</div>'+
        '<div class="order-item-qty">×'+item.qty+'</div>'+
        '<div class="order-item-price">'+fmt(item.price*item.qty)+'</div>'+
      '</div>';
    }).join(''):'<div style="color:var(--text-3);font-size:12px;">Ürün bilgisi yok</div>';

    var addressHtml=d.customer&&d.customer.address?'<div class="order-meta-row"><div class="order-meta-label">Teslimat Adresi</div><div class="order-meta-value">'+esc(d.customer.address)+'</div></div>':'';
    var phoneHtml=d.customer&&d.customer.phone?'<div class="order-meta-row"><div class="order-meta-label">Telefon</div><div class="order-meta-value">'+esc(d.customer.phone)+'</div></div>':'';

    return '<div class="order-card" id="order-'+doc.id+'">'+
      '<div class="order-head" onclick="toggleOrder(document.getElementById(\'order-'+doc.id+'\'))">'+
        '<div>'+
          '<div class="order-no">'+orderNo+'</div>'+
          '<div class="order-date">'+date+'</div>'+
        '</div>'+
        '<div class="order-head-right">'+
          statusBadge(status)+
          '<div class="order-total">'+fmt(d.total)+'</div>'+
          '<i class="fa-solid fa-chevron-down order-chevron"></i>'+
        '</div>'+
      '</div>'+
      '<div class="order-body">'+
        '<div class="order-items">'+itemsHtml+'</div>'+
        '<div class="order-meta">'+
          '<div class="order-meta-row"><div class="order-meta-label">Ürün Sayısı</div><div class="order-meta-value">'+itemCount+' adet</div></div>'+
          '<div class="order-meta-row"><div class="order-meta-label">Ödeme Yöntemi</div><div class="order-meta-value">WhatsApp Sipariş</div></div>'+
          phoneHtml+
          addressHtml+
        '</div>'+
        '<div class="order-footer">'+
          '<div>'+statusBadge(status)+'</div>'+
          '<button class="wa-track-btn" onclick="waTrack(\''+doc.id.slice(-8).toUpperCase()+'\',\''+esc(customerName)+'\')">'+
            '<i class="fa-brands fa-whatsapp"></i> WhatsApp\'tan Takip Et'+
          '</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  /* İlk siparişi açık bırak */
  if(docs.length>0){
    var firstCard=document.getElementById('order-'+docs[0].id);
    if(firstCard) firstCard.classList.add('open');
  }
}

function bindOrderQuery(sourceKey, query){
  var unsub=query.onSnapshot(function(snap){
    orderDocsBySource[sourceKey]=snap.docs;
    renderMergedOrders();
  },function(err){
    console.error('Order query error ('+sourceKey+'):', err.message);
  });
  orderUnsubs.push(unsub);
}

auth.onAuthStateChanged(function(user){
  orderUnsubs.forEach(function(fn){try{fn();}catch(e){}});
  orderUnsubs=[];
  orderDocsBySource={uid:[],email:[],customerEmail:[]};

  if(!user){
    document.getElementById('auth-card').style.display='block';
    document.getElementById('profile-area').style.display='none';
    return;
  }

  document.getElementById('auth-card').style.display='none';
  document.getElementById('profile-area').style.display='block';

  /* Profil */
  document.getElementById('profile-name').textContent=user.displayName||'Kullanıcı';
  document.getElementById('profile-email').textContent=user.email||'';
  if(user.photoURL){
    document.getElementById('profile-avatar').innerHTML='<img src="'+user.photoURL+'" referrerpolicy="no-referrer" />';
  } else {
    var initials=(user.displayName||'K').slice(0,2).toUpperCase();
    document.getElementById('profile-avatar').textContent=initials;
  }

  /* Sipariş sorgular */
  bindOrderQuery('uid', db.collection('orders').where('userId','==',user.uid).orderBy('createdAt','desc'));
  if(user.email){
    bindOrderQuery('email', db.collection('orders').where('userEmail','==',user.email).orderBy('createdAt','desc'));
    bindOrderQuery('customerEmail', db.collection('orders').where('customer.email','==',user.email).orderBy('createdAt','desc'));
  }
});
</script>
</body>
</html>
