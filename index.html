<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akif İletişim — Premium Teknoloji</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .header {
      position:fixed;top:0;left:0;right:0;z-index:1000;height:68px;
      background:rgba(17,19,21,.88);backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,.06);transition:background .3s,box-shadow .3s;
    }
    .header.scrolled{background:rgba(17,19,21,.98);box-shadow:0 4px 32px rgba(0,0,0,.55)}
    .header__inner{max-width:1380px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;gap:16px}
    .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none}
    .logo__icon{width:36px;height:36px;border-radius:9px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;color:#c9a84c;font-size:15px}
    .logo__text{font-size:15px;font-weight:800;letter-spacing:-.025em;color:#eaedf0}
    .logo__text span{color:#c9a84c}
    .search-wrap{flex:1;max-width:480px;position:relative}
    .search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#5a6070;font-size:13px;pointer-events:none}
    .search-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 36px;color:#eaedf0;font-family:'Poppins',sans-serif;font-size:13px;transition:all .22s}
    .search-input::placeholder{color:#5a6070}
    .search-input:focus{border-color:rgba(201,168,76,.4);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(201,168,76,.1);outline:none}
    .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#5a6070;font-size:12px;cursor:pointer;display:none;padding:4px;transition:color .2s}
    .search-clear:hover{color:#c9a84c}
    .header__actions{display:flex;align-items:center;gap:6px;margin-left:auto}
    .header__btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#9aa0aa;background:transparent;border:1px solid transparent;cursor:pointer;transition:all .22s;position:relative;font-size:14px}
    .header__btn:hover{color:#eaedf0;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
    .cart-badge{position:absolute;top:-3px;right:-3px;width:17px;height:17px;border-radius:50%;background:#c9a84c;color:#0a0a0a;font-size:9px;font-weight:800;display:none;align-items:center;justify-content:center;border:1.5px solid #111315}

    /* Kullanıcı menüsü */
    .user-area{position:relative}
    .user-btn{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.08);background:transparent;cursor:pointer;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:#9aa0aa;transition:all .22s}
    .user-btn:hover{color:#eaedf0;border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06)}
    .user-btn img{width:24px;height:24px;border-radius:50%;object-fit:cover}
    .user-btn .user-name{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:200px;background:#1a1d21;border:1px solid #2e333a;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;display:none;animation:fade-up .2s ease}
    .user-dropdown.open{display:block}
    @keyframes fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .user-dropdown-item{display:flex;align-items:center;gap:9px;padding:11px 16px;font-size:13px;font-weight:500;color:#9aa0aa;cursor:pointer;transition:all .18s;border:none;background:none;width:100%;font-family:'Poppins',sans-serif}
    .user-dropdown-item:hover{background:#21252b;color:#eaedf0}
    .user-dropdown-item i{width:14px;text-align:center;font-size:12px}
    .user-dropdown-item.danger:hover{color:#f87171}
    .user-dropdown-divider{height:1px;background:#2e333a;margin:4px 0}

    /* Admin butonu */
    .admin-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;letter-spacing:.04em;color:#5a6070;border:1px solid rgba(255,255,255,.06);background:transparent;cursor:pointer;transition:all .22s;font-family:'Poppins',sans-serif}
    .admin-btn:hover{color:#c9a84c;border-color:rgba(201,168,76,.25);background:rgba(201,168,76,.06)}

    /* Hero */
    .hero{margin-top:68px;min-height:400px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;background:#111315}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(201,168,76,.07) 0%,transparent 70%),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,.018) 60px),repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,.018) 60px);pointer-events:none}
    .hero__content{position:relative;z-index:1;padding:48px 24px}
    .hero__eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#c9a84c;margin-bottom:16px}
    .hero__eyebrow::before,.hero__eyebrow::after{content:'';width:28px;height:1px;background:#c9a84c}
    .hero__title{font-size:clamp(2rem,5vw,3.6rem);font-weight:900;letter-spacing:-.04em;line-height:1.05;color:#eaedf0;margin-bottom:12px}
    .hero__title .gold{background:linear-gradient(135deg,#c9a84c 0%,#e2c47a 50%,#c9a84c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:shimmer-text 3s linear infinite}
    @keyframes shimmer-text{0%{background-position:0% center}100%{background-position:200% center}}
    .hero__sub{font-size:14px;color:#6a7080;font-weight:300;max-width:420px;margin:0 auto}

    /* Kategori çubuğu */
    .categories-bar{background:#161a1f;border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:68px;z-index:900}
    .categories-inner{max-width:1380px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none}
    .categories-inner::-webkit-scrollbar{display:none}
    .cat-chip{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:46px;border-bottom:2px solid transparent;font-size:12px;font-weight:500;color:#6a7080;cursor:pointer;white-space:nowrap;transition:all .2s;background:transparent;border-left:none;border-right:none;border-top:none;flex-shrink:0;font-family:'Poppins',sans-serif}
    .cat-chip i{font-size:11px}
    .cat-chip:hover{color:#eaedf0}
    .cat-chip.active{color:#c9a84c;border-bottom-color:#c9a84c;font-weight:600}

    /* Ürünler */
    .products-section{max-width:1380px;margin:0 auto;padding:40px 24px 80px}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
    .section-head h2{font-size:19px;font-weight:700;letter-spacing:-.02em;color:#eaedf0}
    .product-count{font-size:12px;color:#5a6070}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:18px}

    /* Kart */
    .p-card{background:#1a1d21;border:1px solid #2e333a;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .3s cubic-bezier(.4,0,.2,1),border-color .3s,box-shadow .3s;animation:card-in .4s ease both}
    .p-card:hover{transform:translateY(-6px);border-color:rgba(201,168,76,.3);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 20px rgba(201,168,76,.1)}
    @keyframes card-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .p-card__img{position:relative;background:#21252b;aspect-ratio:4/3;overflow:hidden}
    .p-card__img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
    .p-card:hover .p-card__img img{transform:scale(1.05)}
    .badge-firsat{position:absolute;top:12px;left:12px;z-index:2;background:linear-gradient(135deg,#c9a84c,#e2c47a);color:#0a0a0a;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;display:flex;align-items:center;gap:4px;box-shadow:0 2px 12px rgba(201,168,76,.4);animation:badge-pulse 2.5s ease-in-out infinite}
    @keyframes badge-pulse{0%,100%{box-shadow:0 2px 12px rgba(201,168,76,.4)}50%{box-shadow:0 2px 20px rgba(201,168,76,.7)}}
    .badge-pct{position:absolute;top:12px;right:12px;z-index:2;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);color:#c9a84c;border:1px solid rgba(201,168,76,.3);font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px}
    .out-of-stock-overlay{position:absolute;inset:0;z-index:3;background:rgba(17,19,21,.72);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center}
    .out-of-stock-overlay span{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#f87171;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.12);padding:6px 14px;border-radius:999px}
    .p-card__body{padding:14px 16px;display:flex;flex-direction:column;gap:7px;flex:1}
    .p-card__cat{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#c9a84c}
    .p-card__name{font-size:13px;font-weight:600;color:#eaedf0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .p-card__price{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-top:auto}
    .price-new{font-size:19px;font-weight:800;letter-spacing:-.03em;line-height:1;background:linear-gradient(135deg,#c9a84c,#e2c47a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .price-new.normal{background:none;-webkit-text-fill-color:#eaedf0;color:#eaedf0}
    .price-old{font-size:12px;color:#4a5060;font-weight:400;position:relative;padding:0 1px}
    .price-old::after{content:'';position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:1px;background:#4a5060}
    .p-card__footer{padding:0 16px 16px}
    .btn-cart{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border-radius:9px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;letter-spacing:.03em;cursor:pointer;transition:all .22s;border:1px solid #2e333a;background:#21252b;color:#9aa0aa}
    .btn-cart:hover{background:linear-gradient(135deg,#c9a84c,#e2c47a);border-color:transparent;color:#0a0a0a;box-shadow:0 4px 16px rgba(201,168,76,.3)}
    .btn-cart.added{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.25);color:#4ade80}

    /* Skeleton */
    .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:18px}
    .skeleton-card{background:#1a1d21;border:1px solid #21252b;border-radius:18px;overflow:hidden}
    .sk{background:linear-gradient(90deg,#1a1d21 0%,#272c33 50%,#1a1d21 100%);background-size:200% 100%;animation:sk 1.4s ease infinite;border-radius:6px}
    @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .empty-state{text-align:center;padding:80px 24px;color:#4a5060;grid-column:1/-1}
    .empty-state i{font-size:40px;margin-bottom:14px;display:block}

    /* Sepet */
    .cart-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
    .cart-overlay.open{opacity:1;pointer-events:all}
    .cart-drawer{position:fixed;top:0;right:0;bottom:0;z-index:2100;width:min(400px,94vw);background:#1a1d21;border-left:1px solid #2e333a;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
    .cart-overlay.open .cart-drawer{transform:translateX(0)}
    .cart-drawer__head{padding:20px 24px;border-bottom:1px solid #2e333a;display:flex;align-items:center;justify-content:space-between}
    .cart-drawer__title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
    .cart-drawer__title i{color:#c9a84c}
    .cart-close{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6a7080;cursor:pointer;transition:all .2s;background:#21252b;border:1px solid #2e333a}
    .cart-close:hover{color:#eaedf0}
    .cart-drawer__body{flex:1;overflow-y:auto;padding:20px 24px}
    .cart-drawer__footer{padding:20px 24px;border-top:1px solid #2e333a}
    .cart-total{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:14px}
    .cart-total span:first-child{color:#9aa0aa}
    .cart-total-price{font-size:22px;font-weight:800;color:#c9a84c;letter-spacing:-.03em}
    .btn-checkout{width:100%;padding:13px;background:linear-gradient(135deg,#c9a84c,#e2c47a);color:#0a0a0a;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .22s;box-shadow:0 4px 16px rgba(201,168,76,.22)}
    .btn-checkout:hover{filter:brightness(1.1)}
    .cart-item{display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .cart-item:last-child{border-bottom:none}
    .cart-item__img{width:52px;height:52px;border-radius:10px;background:#21252b;object-fit:cover;flex-shrink:0;border:1px solid #2e333a}
    .cart-item__info{flex:1;min-width:0}
    .cart-item__name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cart-item__price{font-size:13px;color:#c9a84c;font-weight:700;margin-top:2px}
    .cart-item__qty{display:flex;align-items:center;gap:8px;margin-top:6px}
    .qty-btn{width:24px;height:24px;border-radius:6px;background:#272c33;border:1px solid #2e333a;display:flex;align-items:center;justify-content:center;color:#9aa0aa;font-size:11px;cursor:pointer;transition:all .2s}
    .qty-btn:hover{background:#c9a84c;color:#0a0a0a;border-color:#c9a84c}
    .qty-num{font-size:13px;font-weight:600;min-width:18px;text-align:center}
    .cart-item__remove{color:#3a4050;cursor:pointer;font-size:13px;transition:color .2s;flex-shrink:0}
    .cart-item__remove:hover{color:#f87171}
    .cart-empty{text-align:center;padding:48px 0;color:#3a4050}
    .cart-empty i{font-size:36px;margin-bottom:12px;display:block}

    /* Admin login modal */
    .modal-overlay{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .login-modal{width:min(400px,92vw);background:#1a1d21;border:1px solid #2e333a;border-radius:20px;padding:36px 32px;box-shadow:0 8px 40px rgba(0,0,0,.6);transform:scale(.96);transition:transform .25s;position:relative}
    .modal-overlay.open .login-modal{transform:scale(1)}
    .login-modal h2{font-size:18px;font-weight:800;margin-bottom:4px}
    .login-modal p{font-size:12px;color:#9aa0aa;margin-bottom:24px}
    .login-error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;border-radius:9px;padding:10px 14px;font-size:12px;margin-bottom:14px;display:none}
    .lm-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .lm-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9aa0aa}
    .lm-input{background:#21252b;border:1px solid #2e333a;border-radius:9px;padding:10px 14px;color:#eaedf0;font-family:'Poppins',sans-serif;font-size:13px;width:100%;transition:all .22s}
    .lm-input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.12);outline:none}
    .lm-input::placeholder{color:#4a5060}
    .btn-login{width:100%;margin-top:8px;padding:12px;background:linear-gradient(135deg,#c9a84c,#e2c47a);color:#0a0a0a;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .22s}
    .btn-login:hover{filter:brightness(1.1)}
    .btn-login .spinner{display:none;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#0a0a0a;border-radius:50%;animation:spin .6s linear infinite}
    .btn-login.loading .lbl{display:none} .btn-login.loading .spinner{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal-close-x{position:absolute;top:14px;right:16px;color:#5a6070;cursor:pointer;font-size:16px;transition:color .2s}
    .modal-close-x:hover{color:#eaedf0}

    /* WA */
    .wa-btn{position:fixed;bottom:28px;right:28px;z-index:800;width:50px;height:50px;border-radius:50%;background:#1a1d21;border:1px solid #2e333a;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(0,0,0,.35);text-decoration:none}
    .wa-btn svg{width:22px;height:22px;color:#5a6070;transition:color .25s}
    .wa-btn:hover{border-color:rgba(201,168,76,.3);box-shadow:0 0 20px rgba(201,168,76,.18);transform:translateY(-3px)}
    .wa-btn:hover svg{color:#c9a84c}
    .wa-dot{position:absolute;top:6px;right:6px;width:9px;height:9px;border-radius:50%;background:#4ade80;border:2px solid #1a1d21;animation:wa-pulse 2.5s ease-in-out infinite}
    @keyframes wa-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

    /* Toast */
    #toast-root{position:fixed;bottom:90px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
    .toast{display:flex;align-items:center;gap:10px;background:#1a1d21;border:1px solid #2e333a;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;color:#eaedf0;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:toast-in .3s cubic-bezier(.34,1.56,.64,1) both;min-width:240px}
    .toast i{font-size:14px}
    .toast.t-success{border-left:3px solid #4ade80} .toast.t-success i{color:#4ade80}
    .toast.t-info{border-left:3px solid #c9a84c} .toast.t-info i{color:#c9a84c}
    .toast.t-error{border-left:3px solid #f87171} .toast.t-error i{color:#f87171}
    @keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

    select option{background:#1a1d21;color:#eaedf0}

    @media(max-width:768px){.search-wrap{max-width:none}.products-section{padding:24px 16px 60px}.header__inner{padding:0 16px;gap:10px}.wa-btn{bottom:18px;right:18px}}
    @media(max-width:480px){.product-grid{grid-template-columns:repeat(2,1fr);gap:10px}.p-card__body{padding:10px 12px;gap:5px}.p-card__footer{padding:0 12px 12px}.p-card__name{font-size:12px}.price-new{font-size:16px}.user-btn .user-name{display:none}}
  </style>
</head>
<body>

<header class="header" id="header">
  <div class="header__inner">
    <a href="/" class="logo">
      <div class="logo__icon"><i class="fa-solid fa-bolt"></i></div>
      <div class="logo__text">Akif <span>İletişim</span></div>
    </a>

    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" class="search-input" id="search-input" placeholder="Ürün ara…" oninput="handleSearch(this.value)" />
      <i class="fa-solid fa-xmark search-clear" id="search-clear" onclick="clearSearch()"></i>
    </div>

    <div class="header__actions">
      <button class="header__btn" title="Sepet" onclick="openCart()">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="cart-badge" id="cart-badge">0</span>
      </button>

      <!-- Kullanıcı alanı (giriş yokken Google butonu, girişte avatar) -->
      <div class="user-area" id="user-area">
        <button class="user-btn" id="user-btn" onclick="toggleUserDropdown()">
          <i class="fa-brands fa-google" style="color:#c9a84c;font-size:13px;"></i>
          <span class="user-name" id="user-name-display">Giriş Yap</span>
          <i class="fa-solid fa-chevron-down" style="font-size:9px;"></i>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <!-- JS ile doldurulur -->
        </div>
      </div>

      <button class="admin-btn" onclick="openLoginModal()">
        <i class="fa-solid fa-key"></i> Admin
      </button>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero__content">

</section>

<!-- SEPET DRAWER -->
<div class="cart-overlay" id="cart-overlay" onclick="handleCartOverlayClick(event)">
  <div class="cart-drawer">
    <div class="cart-drawer__head">
      <div class="cart-drawer__title"><i class="fa-solid fa-bag-shopping"></i> Sepetim</div>
      <div class="cart-close" onclick="closeCart()"><i class="fa-solid fa-xmark"></i></div>
    </div>
    <div class="cart-drawer__body" id="cart-body"></div>
    <div class="cart-drawer__footer" id="cart-footer" style="display:none;">
      <div class="cart-total"><span>Toplam</span><span class="cart-total-price" id="cart-total-price">₺0,00</span></div>
      <button class="btn-checkout" onclick="checkout()"><i class="fa-brands fa-whatsapp"></i> WhatsApp ile Sipariş Ver</button>
    </div>
  </div>
</div>

<!-- ADMİN GİRİŞ MODALİ -->
<div class="modal-overlay" id="login-modal-overlay" onclick="handleModalOverlayClick(event)">
  <div class="login-modal">
    <i class="fa-solid fa-xmark modal-close-x" onclick="closeLoginModal()"></i>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <div style="width:38px;height:38px;border-radius:9px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;color:#c9a84c;font-size:14px;"><i class="fa-solid fa-bolt"></i></div>

    </div>
    <h2>Admin Girişi</h2>
    <p>Yönetim paneline erişmek için giriş yapın.</p>
    <div class="login-error" id="login-error"></div>
    <div class="lm-group"><label class="lm-label">E-posta</label><input type="email" class="lm-input" id="lm-email" placeholder="admin@akifiletisim.com" /></div>
    <div class="lm-group"><label class="lm-label">Şifre</label><input type="password" class="lm-input" id="lm-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <span class="lbl"><i class="fa-solid fa-right-to-bracket"></i> Giriş Yap</span>
      <span class="spinner"></span>
    </button>
  </div>
</div>
