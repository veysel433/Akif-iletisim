<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ürün Detayı — Akif İletişim</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg:#111315;--surface:#1a1d21;--surface-2:#21252b;--surface-3:#272c33;
      --border:#2e333a;--border-light:rgba(255,255,255,.05);
      --gold:#c9a84c;--gold-light:#e2c47a;--gold-dim:rgba(201,168,76,.12);--gold-border:rgba(201,168,76,.28);
      --text-1:#eaedf0;--text-2:#9aa0aa;--text-3:#444;
      --green:#4ade80;--green-dim:rgba(74,222,128,.12);
      --red:#f87171;--red-dim:rgba(248,113,113,.1);
      --r:14px;--t:220ms cubic-bezier(.4,0,.2,1);
      font:400 14px/1.6 'Poppins',sans-serif;color:var(--text-1);background:var(--bg);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:
        radial-gradient(1100px 640px at -10% -20%,rgba(201,168,76,.10),transparent 62%),
        radial-gradient(760px 440px at 110% -10%,rgba(100,145,255,.08),transparent 56%),
        var(--bg);
      color:var(--text-1);
    }
    body::before{
      content:"";
      position:fixed;inset:-20% -10%;z-index:-1;pointer-events:none;
      background:conic-gradient(from 110deg at 34% 30%,rgba(201,168,76,.08),rgba(110,150,255,.05),rgba(201,168,76,.08));
      filter:blur(52px);animation:pd-aurora 18s linear infinite;
    }
    @keyframes pd-aurora{0%{transform:translateX(-2%)}50%{transform:translateX(2%)}100%{transform:translateX(-2%)}}
    a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
    button,input,select,textarea{font-family:inherit;border:none;background:none}
    button{cursor:pointer}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

    header{position:sticky;top:0;z-index:200;height:64px;background:rgba(17,19,21,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .h-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-icon{width:34px;height:34px;border-radius:8px;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:13px}
    .logo-text{font-size:14px;font-weight:800;letter-spacing:-.02em}
    .logo-text span{color:var(--gold)}
    .h-right{display:flex;align-items:center;gap:8px}
    .h-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);font-size:12px;font-weight:500;color:var(--text-2);transition:all var(--t);cursor:pointer}
    .h-btn:hover{color:var(--text-1);border-color:var(--text-3)}
    .cart-btn{position:relative}
    .cart-badge{position:absolute;top:-4px;right:-4px;width:17px;height:17px;border-radius:50%;background:var(--gold);color:#0a0a0a;font-size:9px;font-weight:800;display:none;align-items:center;justify-content:center;border:1.5px solid var(--bg)}

    .breadcrumb{max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3)}
    .breadcrumb a:hover{color:var(--gold)}
    .breadcrumb i{font-size:9px}

    .page{max-width:1280px;margin:0 auto;padding:0 24px 80px}
    .product-top{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-bottom:64px}

    /* ── AMAZON TARZI GALERİ ── */
    .gallery{display:flex;gap:14px}
    .gallery-thumbs{display:flex;flex-direction:column;gap:8px;width:72px;flex-shrink:0}
    .gallery-thumb{width:72px;height:72px;border-radius:10px;overflow:hidden;border:2px solid var(--border);cursor:pointer;background:var(--surface-2);transition:border-color .2s;flex-shrink:0}
    .gallery-thumb:hover{border-color:var(--gold-border)}
    .gallery-thumb.active{border-color:var(--gold)}
    .gallery-thumb img{width:100%;height:100%;object-fit:cover}
    .gallery-main{flex:1;min-width:0}
    .main-img-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;aspect-ratio:1/1;cursor:zoom-in}
    .main-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.4,0,.2,1);display:block}
    .main-img-wrap:hover img{transform:scale(1.04)}
    .img-badge-sale{position:absolute;top:16px;left:16px;z-index:2;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0a;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:999px;display:flex;align-items:center;gap:5px;box-shadow:0 2px 16px rgba(201,168,76,.45)}
    .img-badge-pct{position:absolute;top:16px;right:16px;z-index:2;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);color:var(--gold);border:1px solid var(--gold-border);font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px}
    .img-badge-out{position:absolute;inset:0;z-index:3;background:rgba(17,19,21,.7);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center}
    .img-badge-out span{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red);border:1px solid rgba(248,113,113,.3);background:var(--red-dim);padding:8px 20px;border-radius:999px}
    .gallery-zoom-hint{font-size:11px;color:var(--text-3);text-align:center;margin-top:6px}

    /* Zoom */
    .zoom-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .zoom-overlay.open{opacity:1;pointer-events:all}
    .zoom-overlay img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px}
    .zoom-close{position:absolute;top:20px;right:24px;width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.1);color:var(--text-1);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:background .2s}
    .zoom-close:hover{background:rgba(255,255,255,.2)}
    .zoom-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:background .2s}
    .zoom-nav:hover{background:rgba(255,255,255,.2)}
    .zoom-prev{left:24px} .zoom-next{right:24px}

    /* Ürün bilgi */
    .product-info{display:flex;flex-direction:column;gap:20px;padding-top:4px}
    .info-cat{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:6px}
    .info-cat::before{content:'';width:20px;height:1px;background:var(--gold)}
    .info-name{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.1}
    .info-divider{height:1px;background:var(--border)}
    .info-price{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
    .price-main{font-size:2.4rem;font-weight:800;letter-spacing:-.05em;line-height:1;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .price-main.normal{background:none;-webkit-text-fill-color:var(--text-1);color:var(--text-1)}
    .price-old{font-size:1.1rem;color:var(--text-3);font-weight:400;position:relative;padding:0 2px}
    .price-old::after{content:'';position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:1px;background:var(--text-3)}
    .price-discount-chip{font-size:11px;font-weight:700;color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-border);padding:3px 10px;border-radius:999px}
    .info-stock{display:flex;align-items:center;gap:8px;font-size:13px}
    .stock-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .stock-dot.in-stock{background:var(--green);animation:blink 2s ease-in-out infinite}
    .stock-dot.out-stock{background:var(--red)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    .stock-label.in-stock{color:var(--green);font-weight:600}
    .stock-label.out-stock{color:var(--red);font-weight:600}
    .info-desc{font-size:14px;color:var(--text-2);line-height:1.8;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
    .qty-row{display:flex;align-items:center;gap:12px}
    .qty-label{font-size:12px;color:var(--text-2);font-weight:500}
    .qty-ctrl{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--surface-2)}
    .qty-ctrl button{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:12px;transition:all .2s}
    .qty-ctrl button:hover{background:var(--gold);color:#0a0a0a}
    .qty-ctrl span{min-width:36px;text-align:center;font-size:14px;font-weight:700}
    .info-actions{display:flex;gap:10px}
    .btn-add-cart{flex:1;padding:14px 20px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0a;border-radius:12px;font-size:14px;font-weight:700;letter-spacing:.03em;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--t);box-shadow:0 4px 20px rgba(201,168,76,.25);cursor:pointer}
    .btn-add-cart:hover{filter:brightness(1.1);transform:translateY(-2px)}
    .btn-add-cart.added{background:linear-gradient(135deg,var(--green),#22c55e);color:#0a0a0a}
    .btn-add-cart:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
    .btn-wa{padding:14px 18px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;transition:all var(--t);cursor:pointer}
    .btn-wa:hover{border-color:#25d366;color:#25d366;background:rgba(37,211,102,.08)}
    .info-meta{display:flex;flex-direction:column;gap:8px}
    .meta-row{display:flex;align-items:center;gap:8px;font-size:12px}
    .meta-row i{color:var(--gold);width:14px;text-align:center}
    .meta-row span{color:var(--text-2)}

    .sk{background:linear-gradient(90deg,var(--surface) 0%,var(--surface-3) 50%,var(--surface) 100%);background-size:200% 100%;border-radius:8px;animation:shimmer 1.4s ease infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    #toast-root{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;min-width:240px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:t-in .3s cubic-bezier(.34,1.56,.64,1) both}
    .toast.t-success{border-left:3px solid var(--green)} .toast.t-success i{color:var(--green)}
    .toast.t-error{border-left:3px solid var(--red)} .toast.t-error i{color:var(--red)}
    .toast.t-info{border-left:3px solid var(--gold)} .toast.t-info i{color:var(--gold)}
    @keyframes t-in{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

    @media(max-width:900px){.product-top{grid-template-columns:1fr;gap:32px}.main-img-wrap{aspect-ratio:4/3}.gallery{flex-direction:column-reverse}.gallery-thumbs{flex-direction:row;width:100%;overflow-x:auto;padding-bottom:4px}.gallery-thumb{width:60px;height:60px;flex-shrink:0}}
    @media(max-width:600px){.page{padding:0 16px 60px}.breadcrumb{padding:12px 16px}.info-actions{flex-direction:column}.btn-wa{justify-content:center}}
  </style>
</head>
<body>

<header>
  <div class="h-inner">
    <a href="index.html" class="logo"><div class="logo-icon"><i class="fa-solid fa-bolt"></i></div><div class="logo-text">Akif <span>İletişim</span></div></a>
    <div class="h-right">
      <a href="index.html" class="h-btn"><i class="fa-solid fa-arrow-left"></i> Geri</a>
      <a href="cart.html" class="h-btn cart-btn"><i class="fa-solid fa-bag-shopping"></i> Sepet<span class="cart-badge" id="cart-badge">0</span></a>
    </div>
  </div>
</header>

<div class="breadcrumb">
  <a href="index.html">Ana Sayfa</a>
  <i class="fa-solid fa-chevron-right"></i>
  <a href="index.html">Ürünler</a>
  <i class="fa-solid fa-chevron-right"></i>
  <span id="bc-name" style="color:var(--text-2);">Yükleniyor…</span>
</div>

<div class="page">
  <div class="product-top" id="product-top">
    <div><div class="sk" style="aspect-ratio:1/1;border-radius:20px;"></div></div>
    <div style="display:flex;flex-direction:column;gap:18px;padding-top:4px;">
      <div class="sk" style="height:12px;width:30%;"></div>
      <div class="sk" style="height:36px;"></div>
      <div class="sk" style="height:36px;width:80%;"></div>
      <div class="sk" style="height:1px;"></div>
      <div class="sk" style="height:48px;width:50%;"></div>
      <div class="sk" style="height:100px;"></div>
      <div class="sk" style="height:52px;border-radius:12px;"></div>
    </div>
  </div>
</div>

<!-- Zoom overlay -->
<div class="zoom-overlay" id="zoom-overlay">
  <div class="zoom-close" onclick="closeZoom()"><i class="fa-solid fa-xmark"></i></div>
  <div class="zoom-nav zoom-prev" onclick="zoomNav(-1)"><i class="fa-solid fa-chevron-left"></i></div>
  <img id="zoom-img" src="" alt="" />
  <div class="zoom-nav zoom-next" onclick="zoomNav(1)"><i class="fa-solid fa-chevron-right"></i></div>
</div>
<div id="toast-root"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyA_qQBvQgAMON13EDSPTUNu58t0W4RD0FA",
  authDomain:        "akif-iletisim-gercekci.firebaseapp.com",
  projectId:         "akif-iletisim-gercekci",
  storageBucket:     "akif-iletisim-gercekci.firebasestorage.app",
  messagingSenderId: "527995566381",
  appId:             "1:527995566381:web:9ef6f0e8c37acbec89fba4",
  measurementId:     "G-D9WD7K857R",
};
const WA_NUMBER = "905419705263";

firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

var productImages = [];
var zoomIdx = 0;
var itemQty = 1;
var productId = new URLSearchParams(location.search).get('id');

/* Sepet badge */
(function(){
  var c = JSON.parse(localStorage.getItem('akif_cart')||'[]');
  var total = c.reduce(function(s,x){ return s+x.qty; },0);
  var badge = document.getElementById('cart-badge');
  if(total>0){ badge.textContent=total; badge.style.display='flex'; }
})();

/* Ürün yükleme */
async function loadProduct() {
  if (!productId) {
    document.getElementById('product-top').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--text-3);"><i class="fa-solid fa-triangle-exclamation" style="font-size:32px;display:block;margin-bottom:12px;"></i>Ürün ID bulunamadı.</div>';
    return;
  }
  try {
    var doc = await db.collection('products').doc(productId).get();
    if (!doc.exists) throw new Error('Ürün mevcut değil');
    renderProduct(doc.id, doc.data());
  } catch(err) {
    document.getElementById('product-top').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--red);">Yükleme hatası: '+esc(err.message)+'</div>';
  }
}

function renderProduct(id, d) {
  var isSale  = d.salePrice && d.salePrice < d.price;
  var isStock = d.stock !== 'outofstock';
  var pct     = isSale ? (d.discountPct || Math.round((1-d.salePrice/d.price)*100)) : 0;
  var images  = Array.isArray(d.imageUrls) && d.imageUrls.length ? d.imageUrls : (d.imageUrl ? [d.imageUrl] : ['']);

  productImages = images;
  document.getElementById('bc-name').textContent = d.name||'Ürün';
  document.title = (d.name||'Ürün') + ' — Akif İletişim';

  /* Galeri */
  var badgesHtml = '';
  if (isSale) badgesHtml += '<div class="img-badge-sale"><i class="fa-solid fa-bolt"></i> Fırsat</div><div class="img-badge-pct">%'+pct+'</div>';
  if (!isStock) badgesHtml += '<div class="img-badge-out"><span>Stok Tükendi</span></div>';

  var thumbsHtml = images.length > 1
    ? '<div class="gallery-thumbs">' + images.map(function(src,i){
        return '<div class="gallery-thumb'+(i===0?' active':'')+'" id="thumb-'+i+'" onclick="setMainImg('+i+')" >'+
          '<img src="'+esc(src)+'" alt="" onerror="this.style.background=\'var(--surface-3)\'" />'+
        '</div>';
      }).join('') + '</div>'
    : '';

  var imgHtml =
    '<div class="gallery">'+
      thumbsHtml+
      '<div class="gallery-main">'+
        '<div class="main-img-wrap" onclick="openZoom(0)">'+
          badgesHtml+
          '<img id="pd-main-img" src="'+esc(images[0]||'')+'" alt="'+esc(d.name)+'" />'+
        '</div>'+
        '<p class="gallery-zoom-hint"><i class="fa-solid fa-magnifying-glass-plus" style="margin-right:4px;"></i>Büyütmek için tıkla</p>'+
      '</div>'+
    '</div>';

  /* Fiyat */
  var priceHtml = isSale
    ? '<span class="price-main">'+fmt(d.salePrice)+'</span><span class="price-old">'+fmt(d.price)+'</span><span class="price-discount-chip">%'+pct+' İndirim</span>'
    : '<span class="price-main normal">'+fmt(d.price)+'</span>';

  var stockClass = isStock ? 'in-stock' : 'out-stock';
  var stockLabel = isStock ? 'Stokta Var — Hızlı Kargo' : 'Stok Tükendi';
  var price = isSale ? d.salePrice : d.price;

  var cartBtn = isStock
    ? '<button class="btn-add-cart" id="cart-btn" onclick="addToCart(\''+esc(id)+'\',\''+esc(d.name)+'\','+price+',\''+esc(images[0]||'')+'\')"><i class="fa-solid fa-bag-shopping"></i> Sepete Ekle</button>'
    : '<button class="btn-add-cart" disabled><i class="fa-solid fa-ban"></i> Stok Tükendi</button>';

  var infoHtml =
    '<div class="product-info">'+
      '<div class="info-cat">'+esc(d.category||'Ürün')+'</div>'+
      '<h1 class="info-name">'+esc(d.name)+'</h1>'+
      '<div class="info-divider"></div>'+
      '<div class="info-price">'+priceHtml+'</div>'+
      '<div class="info-stock"><div class="stock-dot '+stockClass+'"></div><span class="stock-label '+stockClass+'">'+stockLabel+'</span></div>'+
      '<div class="info-desc">'+esc(d.description||'—')+'</div>'+
      (isStock ? '<div class="qty-row"><span class="qty-label">Adet:</span><div class="qty-ctrl"><button onclick="changeQty(-1)"><i class="fa-solid fa-minus"></i></button><span id="qty-disp">1</span><button onclick="changeQty(1)"><i class="fa-solid fa-plus"></i></button></div></div>' : '')+
      '<div class="info-actions">'+cartBtn+
        '<button class="btn-wa" onclick="waOrder(\''+esc(d.name)+'\','+price+')"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>'+
      '</div>'+
      '<div class="info-meta">'+
        '<div class="meta-row"><i class="fa-solid fa-truck-fast"></i><span>Aynı gün kargo imkânı</span></div>'+
        '<div class="meta-row"><i class="fa-solid fa-shield-halved"></i><span>Garantili ürün</span></div>'+
        '<div class="meta-row"><i class="fa-solid fa-rotate-left"></i><span>14 gün iade hakkı</span></div>'+
        '<div class="meta-row"><i class="fa-brands fa-whatsapp" style="color:#25d366;"></i><span>WhatsApp sipariş takibi</span></div>'+
      '</div>'+
    '</div>';

  document.getElementById('product-top').innerHTML = imgHtml + infoHtml;
}

/* Adet değiştirme */
function changeQty(delta) {
  itemQty = Math.max(1, itemQty + delta);
  var el = document.getElementById('qty-disp');
  if (el) el.textContent = itemQty;
}

/* Thumbnail seçimi */
function setMainImg(idx) {
  var main = document.getElementById('pd-main-img');
  if (main && productImages[idx]) main.src = productImages[idx];
  document.querySelectorAll('.gallery-thumb').forEach(function(t,i){
    t.classList.toggle('active', i === idx);
  });
  /* zoom overlay da güncelle */
  zoomIdx = idx;
}

/* ── ZOOM ── */
function openZoom(idx) {
  zoomIdx = idx;
  document.getElementById('zoom-img').src = productImages[zoomIdx] || '';
  document.getElementById('zoom-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeZoom()  { document.getElementById('zoom-overlay').classList.remove('open'); document.body.style.overflow = ''; }
function zoomNav(dir) {
  zoomIdx = (zoomIdx + dir + productImages.length) % productImages.length;
  document.getElementById('zoom-img').src = productImages[zoomIdx] || '';
}
document.addEventListener('keydown',function(e){
  if (e.key==='Escape') closeZoom();
  if (e.key==='ArrowRight') zoomNav(1);
  if (e.key==='ArrowLeft') zoomNav(-1);
});
document.getElementById('zoom-overlay').addEventListener('click',function(e){
  if (e.target === this) closeZoom();
});

/* ── SEPETE EKLE ── */
function addToCart(id, name, price, img) {
  var cart = JSON.parse(localStorage.getItem('akif_cart')||'[]');
  var ex   = cart.find(function(c){ return c.id===id; });
  if(ex){ ex.qty += itemQty; } else { cart.push({id:id,name:name,price:price,imageUrl:img,qty:itemQty}); }
  localStorage.setItem('akif_cart',JSON.stringify(cart));
  var total = cart.reduce(function(s,c){ return s+c.qty; },0);
  var badge = document.getElementById('cart-badge');
  badge.textContent=total; badge.style.display='flex';
  var btn = document.getElementById('cart-btn');
  if(btn){ btn.classList.add('added'); btn.innerHTML='<i class="fa-solid fa-check"></i> Eklendi ('+total+')'; setTimeout(function(){ btn.classList.remove('added'); btn.innerHTML='<i class="fa-solid fa-bag-shopping"></i> Sepete Ekle'; },1800); }
  toast(itemQty+'x '+name+' sepete eklendi.','success');
}

/* WA */
function waOrder(name, price) {
  var fullUrl = window.location.href;
  var msg = 'Merhaba Akif İletişim,\n\nŞu ürünü sipariş etmek istiyorum:\n\n▸ '+name+'\n▸ Fiyat: '+fmt(price)+'\n🔗 '+fullUrl+'\n\nBilgi alabilir miyim?';
  window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');
}

/* Toast */
function toast(msg,type) {
  type=type||'info';
  var icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
  var el=document.createElement('div');
  el.className='toast t-'+type;
  el.innerHTML='<i class="fa-solid '+(icons[type]||icons.info)+'"></i><span>'+esc(msg)+'</span>';
  document.getElementById('toast-root').appendChild(el);
  setTimeout(function(){ el.style.transition='opacity .25s'; el.style.opacity='0'; setTimeout(function(){el.remove();},260); },3000);
}

function fmt(num){ return Number(num||0).toLocaleString('tr-TR',{style:'currency',currency:'TRY',minimumFractionDigits:2}); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadProduct();
