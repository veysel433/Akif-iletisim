<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sepetim — Akif İletişim</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg: #0c0c0c; --surface: #141414; --surface-2: #1c1c1c; --border: #222;
      --gold: #c9a84c; --gold-light: #e2c47a; --gold-dim: rgba(201,168,76,.12); --gold-border: rgba(201,168,76,.28);
      --text-1: #f0f0f0; --text-2: #8a8a8a; --text-3: #444;
      --green: #4ade80; --red: #f87171; --red-dim: rgba(248,113,113,.12);
      --r: 14px; --t: 220ms cubic-bezier(.4,0,.2,1);
      font: 400 14px/1.6 'Poppins', sans-serif; color: var(--text-1); background: var(--bg);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      height: 64px; background: rgba(12,12,12,.92);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
    }
    .h-inner {
      max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 13px;
    }
    .logo-text { font-size: 14px; font-weight: 800; letter-spacing: -.02em; }
    .logo-text span { color: var(--gold); }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; color: var(--text-2);
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface-2);
      transition: all var(--t);
    }
    .back-btn:hover { color: var(--text-1); border-color: var(--text-3); }
    .back-btn i { font-size: 11px; }

    /* ── LAYOUT ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 36px 24px 80px; }
    .page-title {
      font-size: 22px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 28px;
      display: flex; align-items: center; gap: 10px;
    }
    .page-title i { color: var(--gold); font-size: 18px; }
    .page-title .count {
      font-size: 12px; font-weight: 600; color: var(--gold);
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      padding: 2px 10px; border-radius: 999px; letter-spacing: 0;
    }

    .layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }

    /* ── CART LIST ── */
    .cart-list { display: flex; flex-direction: column; gap: 12px; }

    .cart-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px 20px;
      display: flex; gap: 16px; align-items: center;
      transition: border-color var(--t);
      animation: fade-up .3s ease both;
    }
    .cart-item:hover { border-color: #2a2a2a; }
    @keyframes fade-up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .item-img {
      width: 80px; height: 80px; border-radius: 10px;
      background: var(--surface-2); object-fit: cover;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-cat { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text-1); line-height: 1.4; margin-bottom: 8px; }
    .item-unit-price { font-size: 12px; color: var(--text-2); }

    .item-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; flex-shrink: 0; }
    .item-price { font-size: 18px; font-weight: 800; letter-spacing: -.03em; color: var(--gold); }

    .qty-row { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: 11px; transition: all var(--t);
    }
    .qty-btn:hover { background: var(--gold); color: #0a0a0a; border-color: var(--gold); }
    .qty-num { font-size: 14px; font-weight: 700; min-width: 22px; text-align: center; }

    .remove-btn {
      font-size: 12px; color: var(--text-3); transition: color var(--t);
      display: flex; align-items: center; gap: 4px;
    }
    .remove-btn:hover { color: var(--red); }

    /* ── SUMMARY CARD ── */
    .summary {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      position: sticky; top: 80px;
    }
    .summary-head {
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .summary-head i { color: var(--gold); }
    .summary-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

    .sum-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .sum-row .label { color: var(--text-2); }
    .sum-row .value { font-weight: 600; }
    .sum-divider { height: 1px; background: var(--border); }
    .sum-total .label { font-size: 14px; font-weight: 600; color: var(--text-1); }
    .sum-total .value { font-size: 22px; font-weight: 800; letter-spacing: -.04em; color: var(--gold); }

    /* WhatsApp numarası alanı */
    .wa-input-wrap { display: flex; flex-direction: column; gap: 6px; }
    .wa-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-2);
    }
    .wa-input-row { position: relative; }
    .wa-prefix {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 12px; font-weight: 600; color: var(--text-2); pointer-events: none;
    }
    .wa-input {
      width: 100%; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 9px;
      padding: 10px 12px 10px 34px; color: var(--text-1);
      font-family: 'Poppins', sans-serif; font-size: 13px;
      transition: all var(--t);
    }
    .wa-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); outline: none; }
    .wa-input::placeholder { color: var(--text-3); }

    /* WhatsApp butonu */
    .btn-wa {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #c9a84c, #e2c47a);
      color: #0a0a0a; border: none; border-radius: 10px;
      font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: .03em; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all var(--t); box-shadow: 0 4px 20px rgba(201,168,76,.25);
    }
    .btn-wa:hover { filter: brightness(1.1); box-shadow: 0 4px 28px rgba(201,168,76,.42); transform: translateY(-1px); }
    .btn-wa:active { transform: translateY(0); }
    .btn-wa i { font-size: 16px; }

    .wa-note { font-size: 11px; color: var(--text-3); text-align: center; line-height: 1.5; }
    .wa-note a { color: var(--gold); text-decoration: underline; text-underline-offset: 2px; }

    /* Clear cart */
    .btn-clear {
      width: 100%; padding: 10px;
      background: var(--red-dim); color: var(--red);
      border: 1px solid rgba(248,113,113,.2); border-radius: 9px;
      font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all var(--t);
    }
    .btn-clear:hover { background: rgba(248,113,113,.2); }

    /* ── BOŞ SEPET ── */
    .empty-cart {
      grid-column: 1/-1; text-align: center; padding: 80px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .empty-cart-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--text-3);
    }
    .empty-cart h2 { font-size: 20px; font-weight: 700; color: var(--text-1); }
    .empty-cart p  { font-size: 13px; color: var(--text-2); max-width: 300px; }
    .btn-go-shop {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 24px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0a0a0a; font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700; margin-top: 4px;
      transition: all var(--t); box-shadow: 0 4px 16px rgba(201,168,76,.25);
    }
    .btn-go-shop:hover { filter: brightness(1.08); transform: translateY(-2px); }

    /* ── TOAST ── */
    #toast-root { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 12px; padding: 12px 16px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      animation: t-in .3s cubic-bezier(.34,1.56,.64,1) both;
    }
    .toast i { color: var(--green); }
    @keyframes t-in { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .summary { position: static; }
      .page { padding: 24px 16px 60px; }
      .item-img { width: 64px; height: 64px; }
    }
    @media (max-width: 480px) {
      .cart-item { flex-wrap: wrap; }
      .item-controls { flex-direction: row; align-items: center; justify-content: space-between; width: 100%; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="h-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
      <div class="logo-text">Akif <span>İletişim</span></div>
    </a>
    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Alışverişe Devam Et
    </a>
  </div>
</header>

<!-- SAYFA -->
<div class="page">

  <!-- Başlık -->
  <div class="page-title">
    <i class="fa-solid fa-bag-shopping"></i>
    Sepetim
    <span class="count" id="item-count">0 ürün</span>
  </div>

  <!-- Grid -->
  <div class="layout" id="layout">
    <!-- JS ile doldurulur -->
  </div>

</div>

<div id="toast-root"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
/* ════════════════════════════════════════════════════
   ⬇️  BURAYA WHATSAPP NUMARANIZI YAZIN
   Başında ülke kodu olmalı, boşluk/tire olmadan.
   Türkiye için: 90 + 10 haneli numara
   Örnek: "905321234567"
════════════════════════════════════════════════════ */
var DEFAULT_WA_NUMBER = "905419705263";
const firebaseConfig={apiKey:"AIzaSyA_qQBvQgAMON13EDSPTUNu58t0W4RD0FA",authDomain:"akif-iletisim-gercekci.firebaseapp.com",projectId:"akif-iletisim-gercekci",storageBucket:"akif-iletisim-gercekci.firebasestorage.app",messagingSenderId:"527995566381",appId:"1:527995566381:web:9ef6f0e8c37acbec89fba4",measurementId:"G-D9WD7K857R"};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth();
var db=firebase.firestore();
var currentUser=null;
auth.onAuthStateChanged(function(u){ currentUser=u; render(); });

/* ─────────────────────────────────────────────────── */

var cart = JSON.parse(localStorage.getItem('akif_cart') || '[]');

function formatPrice(num) {
  return Number(num).toLocaleString('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 2 });
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function saveCart() { localStorage.setItem('akif_cart', JSON.stringify(cart)); }

function totalItems()  { return cart.reduce(function(s,c){ return s+c.qty; }, 0); }
function totalPrice()  { return cart.reduce(function(s,c){ return s+c.price*c.qty; }, 0); }

function changeQty(id, delta) {
  var item = cart.find(function(c){ return c.id===id; });
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { removeItem(id); return; }
  saveCart(); render();
}

function removeItem(id) {
  cart = cart.filter(function(c){ return c.id!==id; });
  saveCart(); render();
  toast('Ürün sepetten kaldırıldı.');
}

function clearCart() {
  if (!cart.length) return;
  cart = []; saveCart(); render();
  toast('Sepet temizlendi.');
}

async function sendWhatsapp() {
  if (!cart.length) { toast('Sepetiniz boş!'); return; }
  if (!currentUser) { toast('Sipariş için önce giriş yapın.'); return; }

  var name = document.getElementById('order-name').value.trim();
  var phone = document.getElementById('order-phone').value.trim();
  var address = document.getElementById('order-address').value.trim();
  if (!name || !phone || !address) { toast('Ad Soyad, telefon ve adres zorunlu.'); return; }

  var lines = cart.map(function(item) {
    return '  • ' + item.name + ' x' + item.qty + ' = ' + formatPrice(item.price * item.qty);
  });

  var orderData = {
    customer:{name:name,phone:phone,address:address,email:(currentUser&&currentUser.email)||''},
    items:cart.map(function(i){return {id:i.id,name:i.name,qty:i.qty,price:i.price};}),
    total:totalPrice(), status:'pending', payment:'whatsapp_form', userId:currentUser.uid, userEmail:(currentUser&&currentUser.email)||'',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    var ref = await db.collection('orders').add(orderData);
    var orderNo = ref.id.slice(-8).toUpperCase();
    var message =
      'Merhaba Akif İletişim, sipariş oluşturmak istiyorum.\n\n' +
      'Sipariş No: #' + orderNo + '\n' +
      'Ad Soyad: ' + name + '\n' +
      'Telefon: ' + phone + '\n' +
      'Adres: ' + address + '\n\n' +
      lines.join('\n') +
      '\n\nToplam Tutar: ' + formatPrice(totalPrice());

    window.open('https://wa.me/' + DEFAULT_WA_NUMBER + '?text=' + encodeURIComponent(message), '_blank');
    clearCart();
  } catch (e) {
    toast('Sipariş gönderilemedi.');
  }
}


function render() {
  var layout    = document.getElementById('layout');
  var countEl   = document.getElementById('item-count');
  var total     = totalItems();
  countEl.textContent = total + ' ürün';

  if (!cart.length) {
    layout.innerHTML =
      '<div class="empty-cart">' +
        '<div class="empty-cart-icon"><i class="fa-solid fa-bag-shopping"></i></div>' +
        '<h2>Sepetiniz boş</h2>' +
        '<p>Henüz ürün eklemediniz. Kampanyalı ürünleri kaçırmayın!</p>' +
        '<a href="index.html" class="btn-go-shop"><i class="fa-solid fa-store"></i> Ürünlere Göz At</a>' +
      '</div>';
    return;
  }

  /* Ürün listesi */
  var itemsHtml = cart.map(function(item, i) {
    var delay = i * 50;
    var fallback = "this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%231c1c1c%22 width=%221%22 height=%221%22/></svg>'";
    return (
      '<div class="cart-item" style="animation-delay:' + delay + 'ms">' +
        '<img class="item-img" src="' + escHtml(item.imageUrl||'') + '" alt="" onerror="' + fallback + '" />' +
        '<div class="item-info">' +
          '<div class="item-cat">' + escHtml(item.category||'Ürün') + '</div>' +
          '<div class="item-name">' + escHtml(item.name) + '</div>' +
          '<div class="item-unit-price">Birim: ' + formatPrice(item.price) + '</div>' +
        '</div>' +
        '<div class="item-controls">' +
          '<div class="item-price">' + formatPrice(item.price * item.qty) + '</div>' +
          '<div class="qty-row">' +
            '<button class="qty-btn" onclick="changeQty(\'' + item.id + '\',-1)"><i class="fa-solid fa-minus"></i></button>' +
            '<span class="qty-num">' + item.qty + '</span>' +
            '<button class="qty-btn" onclick="changeQty(\'' + item.id + '\',1)"><i class="fa-solid fa-plus"></i></button>' +
          '</div>' +
          '<button class="remove-btn" onclick="removeItem(\'' + item.id + '\')">' +
            '<i class="fa-solid fa-trash"></i> Kaldır' +
          '</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');

  /* Özet kartı */
  var itemCount = totalItems();
  var price     = totalPrice();

  var summaryHtml =
    '<div class="summary">' +
      '<div class="summary-head"><i class="fa-solid fa-receipt"></i> Sipariş Özeti</div>' +
      '<div class="summary-body">' +

        /* Toplam satırları */
        '<div class="sum-row"><span class="label">Ürün Adedi</span><span class="value">' + itemCount + ' adet</span></div>' +
        '<div class="sum-row"><span class="label">Ara Toplam</span><span class="value">' + formatPrice(price) + '</span></div>' +
        '<div class="sum-divider"></div>' +
        '<div class="sum-row sum-total"><span class="label">Genel Toplam</span><span class="value">' + formatPrice(price) + '</span></div>' +
        '<div class="sum-divider"></div>' +

        '<div class="wa-input-wrap"><div class="wa-label">Ad Soyad *</div><input class="wa-input" id="order-name" type="text" placeholder="Ad Soyad" /></div>' +
        '<div class="wa-input-wrap"><div class="wa-label">Telefon *</div><input class="wa-input" id="order-phone" type="tel" placeholder="05xx xxx xx xx" /></div>' +
        '<div class="wa-input-wrap"><div class="wa-label">Adres *</div><textarea class="wa-input" id="order-address" placeholder="Teslimat adresi" style="min-height:80px;padding-left:12px"></textarea></div>' +
        '<button class="btn-wa" onclick="sendWhatsapp()"><i class="fa-brands fa-whatsapp"></i> WhatsApp Siparişini Oluştur</button>' +
        '<p class="wa-note">Sadece giriş yapmış kullanıcılar sipariş gönderebilir.</p>' +
        '<div class="sum-divider"></div>' +

        /* Sepeti temizle */
        '<button class="btn-clear" onclick="clearCart()">' +
          '<i class="fa-solid fa-trash"></i> Sepeti Temizle' +
        '</button>' +

      '</div>' +
    '</div>';

  layout.innerHTML =
    '<div class="cart-list">' + itemsHtml + '</div>' +
    summaryHtml;
}

function toast(msg) {
  var root = document.getElementById('toast-root');
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<i class="fa-solid fa-circle-check"></i><span>' + escHtml(msg) + '</span>';
  root.appendChild(el);
  setTimeout(function(){
    el.style.transition = 'opacity .25s'; el.style.opacity = '0';
    setTimeout(function(){ el.remove(); }, 260);
  }, 2600);
}

render();
</script>
</body>
</html>
